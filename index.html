        <div class="card" id="card4" onclick="flipCard('card4')"><p>Keyboard</p></div>
    </div>

    <div class="row">
        <div class="card" id="card5" onclick="flipCard('card5')"><p>Tablet</p></div>

        <div class="card" id="card8" onclick="flipCard('card8')"><p>Phone</p></div>
    </div>
    <script src="script.js"></script>

</html>
